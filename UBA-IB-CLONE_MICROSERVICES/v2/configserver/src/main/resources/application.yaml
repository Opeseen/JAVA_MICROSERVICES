server:
  port: 8030
spring:
  application:
    name: "configserver"
  profiles:
    active: native
  cloud:
    config:
      server:
        git:
          uri: "https://github.com/Opeseen/JAVA_MICROSERVICES.git"
          default-label: master
          timeout: 5
          clone-on-start: true
          force-pull: true
          search-locations: "UBA-IB-CLONE_MICROSERVICES/V2/configFile"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true