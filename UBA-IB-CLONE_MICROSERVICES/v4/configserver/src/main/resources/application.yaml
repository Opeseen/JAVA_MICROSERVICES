server:
  port: 8030
spring:
  application:
    name: "configserver"
  profiles:
    active: git
  cloud:
    config:
      server:
        git:
          uri: "https://github.com/Opeseen/JAVA_MICROSERVICES.git"
          default-label: master
          timeout: 5
          clone-on-start: true
          force-pull: true
          search-paths: "UBA-IB-CLONE_MICROSERVICES/v4/configFile"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com:
      ubaclone:
        configserver: DEBUG
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"